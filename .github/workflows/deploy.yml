# ============================================================
# GitHub Actions Workflow: Deploy to GitHub Pages
# ============================================================
# This workflow automatically publishes the site to GitHub Pages
# whenever changes are pushed to the 'deploy' branch.
#
# How it works:
#   1. Checks out the code from the 'deploy' branch
#   2. Uploads the entire repository as a Pages artifact
#   3. Deploys it to the GitHub Pages environment
#
# To publish a new version:
#   - Merge or push your changes to the 'deploy' branch
#   - This workflow will trigger automatically
#
# Live URL: https://srinagubandi.github.io/siem-reap-private-driver/
# ============================================================

name: Deploy to GitHub Pages

on:
  # Trigger on pushes to the deploy branch
  push:
    branches:
      - deploy
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Grant the workflow permission to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the deploy branch
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: deploy

      # Step 2: Configure GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Step 3: Upload the site files as a Pages artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository root (index.html lives here)
          path: '.'

      # Step 4: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
